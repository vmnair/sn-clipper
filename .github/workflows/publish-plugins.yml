name: Sync Plugins to Public Repo

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Clone Public Repo, Sync, and Push
        env:
          PAT_TOKEN: ${{ secrets.PUBLIC_REPOSITORY_TOKEN }}
        run: |
          # 1. Clone the public repository using the PAT for authentication
          git clone "https://x-access-token:${PAT_TOKEN}@github.com/vmnair/supernote-plugins.git" /tmp/public-repo

          # 2. Clean out old files in the public repo (except the .git folder)
          find /tmp/public-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # 3. Copy files from the private repo's plugins/ directory to the temp public repo folder
          cp -r plugins/* /tmp/public-repo/

          # 4. Commit and push any changes
          cd /tmp/public-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes to sync."
          else
            git commit -m "Sync plugins from private repository (commit: ${{ github.sha }})"
            git push origin main
          fi
